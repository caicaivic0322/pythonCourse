databases:
  - name: python_course_db
    databaseName: python_course
    user: python_course_user

services:
  # ========================================
  # Backend: Django API
  # ========================================
  - type: web
    name: python-course-backend
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: 'False'
      - key: ALLOWED_HOSTS
        value: '*'
      - key: DATABASE_URL
        fromDatabase:
          name: python_course_db
          property: connectionString

  # ========================================
  # Frontend: React + Vite (Static Site)
  # ========================================
  - type: static
    name: python-course-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: python-course-backend
          property: url
          envVarKey: VITE_API_URL_PLACEHOLDER 
          # 注意：Render Static Site 构建时无法直接动态读取 backend URL，
          # 通常需要手动填，或者利用 Render 的特性。
          # 但更简单的做法是：在 Render Dashboard 手动填入 Backend URL，或者在这里先写死一个占位符。
          # 不过，Render Blueprint 允许 linking。
          # VITE_API_URL 需要以 /api/ 结尾
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
